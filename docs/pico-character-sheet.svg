<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 760" width="720" height="760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>PICO Character Sheet — 6 representative expressions</title>
  <defs>
    <linearGradient id="pico-shell" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8edf5"/>
    </linearGradient>
    <linearGradient id="pico-shell-deep" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#cfd6e2"/>
    </linearGradient>
    <linearGradient id="pico-screen" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1a2542"/>
    </linearGradient>
    <radialGradient id="pico-core" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="60%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <linearGradient id="pico-foot" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>

    <symbol id="pico-body" viewBox="0 0 240 340" overflow="visible">
      <ellipse cx="120" cy="322" rx="70" ry="6" fill="rgba(0,0,0,0.45)"/>
      <g>
        <rect x="93" y="232" width="18" height="42" rx="8" fill="url(#pico-shell-deep)"/>
        <rect x="93" y="232" width="18" height="6" rx="3" fill="#cbd5e1"/>
        <ellipse cx="102" cy="280" rx="16" ry="9" fill="url(#pico-foot)"/>
      </g>
      <g>
        <rect x="129" y="232" width="18" height="42" rx="8" fill="url(#pico-shell-deep)"/>
        <rect x="129" y="232" width="18" height="6" rx="3" fill="#cbd5e1"/>
        <ellipse cx="138" cy="280" rx="16" ry="9" fill="url(#pico-foot)"/>
      </g>
      <g transform="rotate(-6 78 170)">
        <circle cx="78" cy="170" r="9" fill="url(#pico-shell-deep)"/>
        <rect x="70" y="172" width="16" height="34" rx="8" fill="url(#pico-shell)"/>
        <circle cx="78" cy="212" r="10" fill="#e8edf5" stroke="#cbd5e1" stroke-width="1"/>
        <circle cx="78" cy="212" r="4" fill="#94a3b8" opacity="0.4"/>
      </g>
      <g transform="rotate(6 162 170)">
        <circle cx="162" cy="170" r="9" fill="url(#pico-shell-deep)"/>
        <rect x="154" y="172" width="16" height="34" rx="8" fill="url(#pico-shell)"/>
        <circle cx="162" cy="212" r="10" fill="#e8edf5" stroke="#cbd5e1" stroke-width="1"/>
        <circle cx="162" cy="212" r="4" fill="#94a3b8" opacity="0.4"/>
      </g>
      <g>
        <rect x="76" y="148" width="88" height="92" rx="22" fill="url(#pico-shell)" stroke="#dbeafe" stroke-width="1.2"/>
        <rect x="86" y="158" width="68" height="72" rx="14" fill="#f8faff" stroke="#dbeafe" stroke-width="1"/>
        <line x1="120" y1="158" x2="120" y2="230" stroke="#e5e7eb" stroke-width="1"/>
        <circle cx="120" cy="194" r="13" fill="url(#pico-core)"/>
        <circle cx="120" cy="194" r="13" fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.6"/>
        <circle cx="120" cy="194" r="6" fill="#bfdbfe" opacity="0.85"/>
        <circle cx="98" cy="222" r="2" fill="#22c55e"/>
        <circle cx="106" cy="222" r="2" fill="#f59e0b"/>
        <circle cx="114" cy="222" r="2" fill="#94a3b8"/>
      </g>
      <g>
        <line x1="120" y1="48" x2="120" y2="22" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
        <rect x="58" y="50" width="124" height="98" rx="28" fill="url(#pico-shell)" stroke="#dbeafe" stroke-width="1.2"/>
        <path d="M70 62 q 0 -10 10 -10 h 30" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
        <circle cx="55" cy="100" r="8" fill="url(#pico-shell-deep)"/>
        <circle cx="55" cy="100" r="4" fill="#64748b"/>
        <circle cx="185" cy="100" r="8" fill="url(#pico-shell-deep)"/>
        <circle cx="185" cy="100" r="4" fill="#64748b"/>
        <rect x="72" y="74" width="96" height="56" rx="14" fill="url(#pico-screen)"/>
        <rect x="72" y="74" width="96" height="56" rx="14" fill="none" stroke="#0a0e1a" stroke-width="1"/>
        <path d="M78 80 L96 80 L78 92 Z" fill="#ffffff" opacity="0.06"/>
      </g>
    </symbol>
  </defs>

  <rect width="720" height="760" fill="#f8fafc"/>

  <!-- Row 1, Col 1: idle -->
  <g transform="translate(0,8)">
    <use href="#pico-body" x="0" y="0" width="240" height="340"/>
    <circle cx="120" cy="18" r="11" fill="#3b82f6" opacity="0.25"/>
    <circle cx="120" cy="18" r="6" fill="#3b82f6"/>
    <circle cx="100" cy="98" r="6" fill="#7dd3fc"/>
    <circle cx="140" cy="98" r="6" fill="#7dd3fc"/>
    <rect x="112" y="112" width="16" height="3" rx="1.5" fill="#7dd3fc"/>
    <text x="120" y="362" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">idle</text>
    <text x="120" y="382" text-anchor="middle" font-size="12" fill="#64748b">평상시 · 호흡 모션</text>
  </g>

  <!-- Row 1, Col 2: smile -->
  <g transform="translate(240,8)">
    <use href="#pico-body" x="0" y="0" width="240" height="340"/>
    <circle cx="120" cy="18" r="11" fill="#f472b6" opacity="0.30"/>
    <circle cx="120" cy="18" r="6" fill="#f472b6"/>
    <path d="M94 100 Q100 92 106 100" fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round"/>
    <path d="M134 100 Q140 92 146 100" fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round"/>
    <path d="M104 112 Q120 122 136 112" fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round"/>
    <circle cx="86" cy="110" r="4" fill="#f472b6" opacity="0.85"/>
    <circle cx="154" cy="110" r="4" fill="#f472b6" opacity="0.85"/>
    <text x="120" y="362" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">smile</text>
    <text x="120" y="382" text-anchor="middle" font-size="12" fill="#64748b">미소 · 더블클릭 원샷</text>
  </g>

  <!-- Row 1, Col 3: love -->
  <g transform="translate(480,8)">
    <use href="#pico-body" x="0" y="0" width="240" height="340"/>
    <circle cx="120" cy="18" r="11" fill="#ec4899" opacity="0.30"/>
    <circle cx="120" cy="18" r="6" fill="#ec4899"/>
    <path d="M100 92 c -6 -7 -16 1 -10 8 c 2 3 7 7 10 10 c 3 -3 8 -7 10 -10 c 6 -7 -4 -15 -10 -8 z" fill="#f472b6" transform="translate(-8 0) scale(0.7) translate(38 38)"/>
    <path d="M140 92 c -6 -7 -16 1 -10 8 c 2 3 7 7 10 10 c 3 -3 8 -7 10 -10 c 6 -7 -4 -15 -10 -8 z" fill="#f472b6" transform="translate(32 0) scale(0.7) translate(38 38)"/>
    <path d="M104 116 Q120 124 136 116" fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round"/>
    <text x="120" y="362" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">love</text>
    <text x="120" y="382" text-anchor="middle" font-size="12" fill="#64748b">하트눈 · 더블클릭 원샷</text>
  </g>

  <!-- Row 2, Col 1: sleep -->
  <g transform="translate(0,388)">
    <use href="#pico-body" x="0" y="0" width="240" height="340"/>
    <circle cx="120" cy="18" r="11" fill="#3b82f6" opacity="0.10"/>
    <circle cx="120" cy="18" r="6" fill="#3b82f6"/>
    <rect x="92" y="98" width="16" height="3" rx="1.5" fill="#7dd3fc"/>
    <rect x="132" y="98" width="16" height="3" rx="1.5" fill="#7dd3fc"/>
    <text x="158" y="76" font-size="14" font-weight="800" fill="#cbd5e1">z</text>
    <text x="170" y="62" font-size="14" font-weight="800" fill="#cbd5e1">Z</text>
    <text x="184" y="48" font-size="14" font-weight="800" fill="#cbd5e1">Z</text>
    <text x="120" y="362" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">sleep</text>
    <text x="120" y="382" text-anchor="middle" font-size="12" fill="#64748b">졸음 · idle 2분 또는 자리비움</text>
  </g>

  <!-- Row 2, Col 2: alert -->
  <g transform="translate(240,388)">
    <use href="#pico-body" x="0" y="0" width="240" height="340"/>
    <circle cx="120" cy="18" r="11" fill="#ef4444" opacity="0.40"/>
    <circle cx="120" cy="18" r="6" fill="#ef4444"/>
    <rect x="98" y="86" width="4" height="14" rx="1.5" fill="#fbbf24"/>
    <rect x="98" y="104" width="4" height="4" rx="1.5" fill="#fbbf24"/>
    <rect x="138" y="86" width="4" height="14" rx="1.5" fill="#fbbf24"/>
    <rect x="138" y="104" width="4" height="4" rx="1.5" fill="#fbbf24"/>
    <text x="120" y="362" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">alert</text>
    <text x="120" y="382" text-anchor="middle" font-size="12" fill="#64748b">새 메일 · 일정 알림</text>
  </g>

  <!-- Row 2, Col 3: angry -->
  <g transform="translate(480,388)">
    <use href="#pico-body" x="0" y="0" width="240" height="340"/>
    <circle cx="120" cy="18" r="11" fill="#ef4444" opacity="0.30"/>
    <circle cx="120" cy="18" r="6" fill="#ef4444"/>
    <rect x="91" y="89" width="14" height="3" rx="1.5" fill="#ef4444"/>
    <rect x="135" y="89" width="14" height="3" rx="1.5" fill="#ef4444"/>
    <circle cx="100" cy="100" r="5" fill="#7dd3fc"/>
    <circle cx="140" cy="100" r="5" fill="#7dd3fc"/>
    <path d="M108 118 Q120 110 132 118" fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round"/>
    <text x="120" y="362" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">angry</text>
    <text x="120" y="382" text-anchor="middle" font-size="12" fill="#64748b">찡그림 · 더블클릭 원샷</text>
  </g>
</svg>
